[workspace]
name = "bruggen-database"
version = "0.0.1"
description = "Database of bridges (Netherlands) with their properties, built from OpenStreetMap"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64"]
readme = "README.md"
license = "GPL-3.0"
license-file = "LICENSE"

[tasks]
# Installation
install = "pre-commit install"
pre-commit = "pre-commit run --all-files"

# Bridge database (default country NL). The whole of NL is too large for a single Overpass
# query, so the national build uses Path B (Geofabrik .pbf streamed with pyosmium).
fetch    = "python -m bridges.pipeline fetch    --country NL --source pbf"
build    = "python -m bridges.pipeline build    --country NL --source pbf"
export   = "python -m bridges.pipeline export   --country NL"
validate = "python -m bridges.pipeline validate --country NL"
all      = { depends-on = ["fetch", "build", "export", "validate"] }

test     = "pytest -q"

[tool.ruff]
# Ruff configuration, see https://docs.astral.sh/ruff/configuration/
#lint.ignore = [
    #"E501",  # Line too long
    #"F401",  # Unused import
    #"F403",  # 'from module import *' used; unable to detect undefined names
    #"F405",  # Name may be undefined, or defined from star imports: module
    #"F841",  # Local variable name is assigned to but never used
    #"T201",  # Use of print statement (use print() function instead)
#]

[dependencies]
python = ">=3.11"
ipykernel ="*"
ipywidgets ="*"
matplotlib ="*"
nbclient ="*"
nbformat ="*"
numpy ="*"
openpyxl = "*"
pandas ="*"
pre-commit = "*"
pytest ="*"
pytest-cov = "*"
pydantic = ">=2.12.4,<3"
ruff = ">=0.8.1"
tqdm = "*"
# Geospatial pipeline stack (conda-forge installs GDAL/GEOS/PROJ cleanly)
sqlite = ">=3.53"   # keep in step with libsqlite so GDAL/_sqlite3 find new symbols
geopandas = "*"
shapely = "*"
pyproj = "*"
requests = "*"
pyyaml = "*"
simplekml = "*"
pyosmium = ">=4.3.1,<5"

[pypi-dependencies]
bridges = { path = "src", editable = true }
osm2geojson = "*"   # Overpass JSON -> GeoJSON (pip-only)
