---
name: Deploy map to GitHub Pages

# Builds the NL bridge dataset + viewer fresh in CI (Path B) and publishes the
# self-contained Leaflet map as the site's index.html. Nothing large is committed.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"   # monthly, shortly after the data refresh
  push:
    branches: [master, main]
    paths:
      - "src/bridges/**"
      - "config/bridges.yml"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: pixi.toml
          pixi-version: "latest"

      # Path B (pyosmium streaming) — a country-wide Overpass query times out. Downloads the
      # ~1.3 GB Geofabrik extract, parses it, then writes the CSV the viewer reads.
      - name: Build dataset + viewer
        run: |
          pixi run python -m bridges.pipeline fetch  --country NL --source pbf
          pixi run python -m bridges.pipeline build  --country NL --source pbf
          pixi run python -m bridges.pipeline export --country NL
          pixi run python -m bridges.pipeline viewer --country NL

      - name: Assemble site
        run: |
          mkdir -p _site
          cp data/processed/bridges_NL_viewer.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
