---
name: Deploy map to GitHub Pages

# Publishes the already-generated viewer (data/processed/bridges_NL_viewer.html) to GitHub
# Pages as index.html. It does NOT rebuild the dataset — regenerate locally with
# `pixi run viewer` and commit the updated HTML to refresh the live map.
on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "data/processed/bridges_NL_viewer.html"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write   # allow the dedup step to delete stale github-pages artifacts

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true   # fetch the viewer if it is tracked by Git LFS

      - name: Assemble site (serve the committed viewer as index.html)
        run: |
          test -f data/processed/bridges_NL_viewer.html
          mkdir -p _site
          cp data/processed/bridges_NL_viewer.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Work around actions/upload-pages-artifact#97: a slow/retried upload (or a
      # "Re-run all jobs") can leave more than one "github-pages" artifact on the run,
      # which makes deploy-pages abort. Keep only the newest and delete the rest.
      - name: Deduplicate Pages artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const dupes = data.artifacts
              .filter(a => a.name === 'github-pages')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(1);
            for (const a of dupes) {
              core.info(`Deleting stale artifact ${a.id} (created ${a.created_at})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: a.id,
              });
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
