---
name: Deploy map to GitHub Pages

# Publishes the already-generated viewer (data/processed/bridges_NL_viewer.html) to GitHub
# Pages as index.html. It does NOT rebuild the dataset — regenerate locally with
# `pixi run viewer` and commit the updated HTML to refresh the live map.
on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "data/processed/bridges_NL_viewer.html"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true   # fetch the viewer if it is tracked by Git LFS

      - name: Assemble site (serve the committed viewer as index.html)
        run: |
          test -f data/processed/bridges_NL_viewer.html
          mkdir -p _site
          cp data/processed/bridges_NL_viewer.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
